name: Keep Supabase Alive

on:
  schedule:
    # S'exécute tous les lundis et jeudis à minuit UTC
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permet de lancer le script manuellement depuis l'interface GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET '${{ secrets.VITE_SUPABASE_URL }}/rest/v1/journal?select=id&limit=1' \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"